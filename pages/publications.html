<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications</title>
  <meta name="description" content="Publications.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="../site/styles.css">
</head>
<body class="publications-page">

  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M3ZC9SSD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <nav class="topbar" data-site-nav></nav>

  <main class="container pub-main">
    <section class="pub-section" aria-labelledby="pub-title">
      <div class="pub-heading">
        <h1 id="pub-title">Publications</h1>
        <hr>
      </div>

      <div class="pub-tags" id="pubTags"></div>

      <div class="pub-filter-row">
        <div class="pub-search">
          <input type="text" id="pubSearchInput" class="pub-search-input" placeholder="Search...">
          <button id="pubSearchBtn" class="pub-search-btn" aria-label="Search publications">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          </button>
        </div>
        <button id="pubResetBtn" class="pub-reset-btn">Reset</button>
      </div>

      <ul class="pub-list" id="pubList" aria-live="polite"></ul>
    </section>
  </main>

  <footer class="site-footer" data-site-footer></footer>

  <script src="../site/script.js"></script>
  <script src="../site/publications.js"></script>
</body>
</html>
